<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JS Assignment Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<header>
    <h1>CALCULATIONS</h1>
</header>
<main class="container">
<section class="card">
    <h2>1. Even Numbers[1-100]</h2>
    <button onclick="showEven()">Show Even Number</button>
    <p id="evenOutput"></p>
</section>

<!--Calculator-->
<section class="card">
    <h2>Calculator</h2>
    <input type="number" id="num1" placeholder="First Number">
    <input type="number" id="num2" placeholder="Second Number">
    <div class="btn-group">
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>
    </div>
    <p id="calcOutput"></p>
</section>
<!--Tax Calculator-->
<section class="card">
    <h2>Tax Calculation</h2>
    <input type="number" id="salary" placeholder="Enter Salary">
    <button onclick="calculateTax()">Calculate Tax</button>
    <p id="taxOutput"></p>
</section>

<section class="card">
    <h2>Sum Of Product</h2>
    <input type="number" id="n1" placeholder="Enter n1">
    <input type="number" id="n2" placeholder="Enter n2">
    <button onclick="findSumProduct()">Calculate Sum Of Product</button>
    <p id="prodOutput"></p>
</section>
</main>

<script src="assignment.js"></script>
</body>

</html>
